<html lang="en">
    <head>
        <link rel="stylesheet" href="hw1.css"> <!-- links to css file-->

            <!-- displays text in the browser's tab-->
        <title>New Patient Registration | Healthy Life Clinic </title>
    </head>
    <body>
        <header>
            <table width="100%">
            <tr>
                <td valign="top" align="left" width="20%">
                    <div class="image">
                        <img align="center" src="Healthlogo.png" alt="Healthy Life Clinic Logo" width="70px" id="logo"/>
                    </div>
                </td>

                <td>
                    <h2>Healthy Life Clinic</h2>
                </td>
                
                <td valign="bottom" align="right" width="20%">
                        <p>Today's Date: <span id="today"></span></p>
                </td>

             </tr>
            </table>
        </header>
<hr>
<!--forms begins here-->
<form action="thankyou.html">
    <center>
        <div class="format">
            <table>
               <tr>
                  <th colspan="4">Create Patient Portal Account</th>
              </tr>
              <!-- patient's information section of the form starts here--> 

            <tr>
                <td class="td1"><label for="fname">First Name:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="fname" 
                    id="fname" 
                    maxlength="30" 
                    required
                    title="Please enter your first name" 
                    placeholder="Shivani"
                    />
                </td>
            </tr>

            <tr>
                <td class="td1"><label for="mini">Middle Initial:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="mini" 
                    id="mini" 
                    maxlength="1" 
                    required
                    title="Please enter your middle initial" 
                    placeholder="A"
                    />
                </td>
            </tr>
            

            <tr>
                <td class="td1"><label for="lname">Last Name:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="lname" 
                    id="lname" 
                    maxlength="30" 
                    required
                    title="Please enter your last name" 
                    placeholder="Gotur"
                    />
                </td>
            </tr>

            <tr>
                <td class="td1"><label for="psex">Patient's Sex:</label></td>
                <td>
                    <input
                    type="radio"
                    id="s1"
                    name="psex"
                    value="Male"
                    />
                    Male

                    <input
                    type="radio"
                    id="s2"
                    name="psex"
                    value="Female"
                    />
                    Female

                    <input
                    type="radio"
                    id="s3"
                    name="psex"
                    value="Other"
                    />
                    Other
                </td>
            </tr>

            <tr>
                <td class= "td1"><label for="dob">Date of Birth:</label></td>
                <td>
                    <input 
                    type="date" 
                    id="dob" 
                    name="dob"
                />
            </td>
        </tr>

        <tr>
            <td class="td1"><label for="ssn">SSN:</td>
                <td>
                    <input
                    type="password"
                    minlength="11"
                    maxlength="11"
                    name="ssn"
                    id="ssn"
                    required
                    title="Please enter your social security number"
                    placeholder="123-45-6789"
                    />
                    </td>
        </tr>

        <tr>
            <th colspan="4"><hr></th> <!---line divider-->
        <tr>

        <tr>
            <th colspan="4">Patient's Contact Information</th>
        </tr>

        <tr>
                <td class="td1"><label for="address 1">Address:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="address1" 
                    id="address1" 
                    maxlength="40" 
                    required
                    title="Please enter your address" 
                    placeholder="4312 Hopper Purple Cir"
                    />
                </td>
            </tr>

        <tr>
                <td class="td1"><label for="address 2">Address (cont.):</label></td>
                <td>
                    <input 
                    type="text" 
                    name="address2" 
                    id="address2" 
                    maxlength="40" 
                    required
                    title="Please enter your address" 
                    placeholder="CBB 175"
                    />
                </td>
            </tr>

        <tr>
                <td class="td1"><label for="city">City:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="city" 
                    id="city" 
                    maxlength="40" 
                    required
                    title="Please enter your city" 
                    placeholder="San Jose"
                    />
                </td>
            </tr>


        <tr>
            <td class="td1"><label for="state">State:<Label></td>
            <td>
	             <select>
                    <option selected disabled>Please Select One</option>
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option>
                    <option value="DC">District of Columbia</option>
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="GU">Guam</option>	
                    <option value="HI">Hawaii</option>	
                    <option value="ID">Idaho</option>	
                    <option value="IL">Illinois</option>	
                    <option value="IN">Indiana</option>	
                    <option value="IA">Iowa</option>	
                    <option value="KS">Kansas</option>	
                    <option value="KY">Kentucky</option>	
                    <option value="LA">Louisiana</option>	
                    <option value="ME">Maine</option>	
                    <option value="MD">Maryland</option>	
                    <option value="MA">Massachusetts</option>	
                    <option value="MI">Michigan</option>	
                    <option value="MN">Minnesota</option>	
                    <option value="MS">Mississippi</option>	
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>	
                    <option value="NH">New Hampshire</option>	
                    <option value="NJ">New Jersey</option>	
                    <option value="NM">New Mexico</option>	
                    <option value="NY">New York</option>	
                    <option value="NC">North Carolina</option>	
                    <option value="ND">North Dakota</option>	
                    <option value="OH">Ohio</option>	
                    <option value="OK">Oklahoma</option>	
                    <option value="OR">Oregon</option>	
                    <option value="PA">Pennsylvania</option>	
                    <option value="PR">Puerto Rico</option>	
                    <option value="RI">Rhode Island</option>	
                    <option value="SC">South Carolina</option>	
                    <option value="SD">South Dakota</option>	
                    <option value="TN">Tennessee</option>	
                    <option value="TX">Texas</option>	
                    <option value="UT">Utah</option>	
                    <option value="VT">Vermont</option>	
                    <option value="VA">Virginia</option>	
                    <option value="WA">Washington</option>	
                    <option value="WV">West Virginia</option>	
                    <option value="WI">Wisconsin</option>	
                    <option value="WY">Wyoming</option>	
                </select>
            </td>
        </tr>

        <tr>
                <td class="td1"><label for="zcode">Zip Code:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="zcode" 
                    pattern="[0-9]{5}"
                    id="zcode" 
                    maxlength="5" 
                    required
                    title="Please enter your zip code" 
                    placeholder="77893"
                    />
                </td>
            </tr>

        <tr>
                <td class="td1"><label for="email">Email Address:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="email" 
                    id="email"
                    required
                    title="Please enter your email address" 
                    placeholder="tp.uh@gmail.com"
                    />
                </td>
            </tr>

        <tr>
                <td class="td1"><label for="phnum">Phone Number:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="phnum" 
                    id="phnum" 
                    pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                    maxlength="40" 
                    required
                    title="Please enter your phone number" 
                    placeholder="555-666-7777"
                    />
                </td>
            </tr>

           <tr>
                <th colspan="4"><hr></th> <!---line divider-->
            </tr>
        
        
            <!--patient history section of the form--->
            <tr>
                <th colspan="4">Patient's History</th>
            </tr>

            <tr>
                <td class= "td1"><label for="pat_his">Have you ever had or/are you <br> currently experincing?</label></td>
                <td>
                    <input type="checkbox" id="option1" value="Stress or Anxiety"/>
                    <label for="Stress or Anxiety">Stress or Anxiety</label><br>

                    <input type="checkbox" id="option2" value="Insomnia"/>
                    <label for="Insomnia">Insomnia</label><br>

                    <input type="checkbox" id="option3" value="Stomach Discomfort"/>
                    <label for="Stomach Discomfort">Stomach Discomfort</label><br>

                    <input type="checkbox" id="option4" value="Brain Fog"/>
                    <label for="Brain Fog">Brain fog</label><br>

                    <input type="checkbox" id="option5" value="Migraines/Headaches"/>
                    <label for="Migraines/Headaches">Migraines/Headaches</label><br>

                    <input type="checkbox" id="option6" value="Other"/>
                    <label for="Other">Other</label><br>
                </td>
            </tr>

            <tr>
                <td class="td1" align="right">
                    <label for="notes">If you selected any of the above,<br> please explain:</label>
                </td>
                <td>
                    <textarea
                    rows="4"
                    cols="35"
                    maxlength="500"
                    id="notes"
                    name="notes"
                    title="Please enter a brief descrption of your symptoms"
                    placeholder="(Insert text here...)"
                    ></textarea>
                    <span id="description_text"></span>
                </td>
            </tr>
            
            <!--html for range slider-->
            <tr>
                 <td class= "td1"><label for="range">Urgency of Appointment? <br/>(Rate from 1 to 10)</label></td>
                 <td>
                    <input
                    type="range"
                    name="range"
                    id="range"
                    min="1"
                    max="10"
                    value="0"
                    />
                    <span id="range-slider"></span>
                </td>
            </tr>

            <tr>
                <th colspan="4"><hr></th> <!---line divider-->
            </tr>

            <!--account information section begins here -->
            <tr>
                <th colspan="4">Finish Patient Portal Account:</label></th>
            </tr>

            <tr>
                <td class="td1"><label for="uname">Userame:</label></td>
                <td>
                    <input 
                    type="text" 
                    name="uname" 
                    id="uname" 
                    maxlength="15" 
                    required
                    title="Please enter your username" 
                    placeholder="sgotur143"
                    />
                </td>
            </tr>

            
            <tr>
                <td class="td1"><label for="pword">Password:</label></td>
                <td>
                    <input 
                    type="password" 
                    name="pword" 
                    id="pword" 
                    minlength="10"
                    maxlength="30" 
                    required
                    title="Please enter a password" 
                    placeholder="Required"
                    />
                </td>
            </tr>

            <tr>
                <td class="td1"><label for="con_pword">Confirm Password:</label></td>
                <td>
                    <input 
                    type="password" 
                    name="con_pword" 
                    id="con_pword" 
                    minlength="10"
                    maxlength="30" 
                    required
                    title="Please confirm a password" 
                    placeholder="Required"
                    />
                </td>
            </tr>

            <tr>
                <td colspan="4">
                    <center>
                        <input type="submit" name="submit">
                        <input type="reset" name="reset">
                    </center>
                </td>
            </tr>

        </table>
    </div>
 </center>
</form>
